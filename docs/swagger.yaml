basePath: /
definitions:
  api.ChatRequest:
    properties:
      message:
        example: What should I do in my garden today?
        type: string
    type: object
  api.ChatResponse:
    properties:
      interaction:
        additionalProperties: {}
        type: object
      response:
        example: Based on your garden profile...
        type: string
      thread_id:
        example: silver-fern-cascade
        type: string
    type: object
  api.CreateThreadRequest:
    properties:
      initial_context:
        items:
          $ref: '#/definitions/api.PinnedContextEntryInput'
        type: array
      project_id:
        example: proj-uuid
        type: string
      title:
        example: Spring tomato project
        type: string
    type: object
  api.ErrorResponse:
    properties:
      error:
        example: invalid or expired token
        type: string
    type: object
  api.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  api.KeyDeletedResponse:
    properties:
      status:
        example: key removed
        type: string
    type: object
  api.KeysResponse:
    properties:
      anthropic:
        example: false
        type: boolean
      gemini:
        example: true
        type: boolean
      openai:
        example: false
        type: boolean
    type: object
  api.LoginRequest:
    properties:
      email:
        example: you@example.com
        type: string
      password:
        example: correct-horse-battery-staple
        type: string
    type: object
  api.LogoutResponse:
    properties:
      status:
        example: logged out
        type: string
    type: object
  api.PinnedContextEntryInput:
    properties:
      subject_id:
        example: plant-uuid
        type: string
      subject_type:
        example: plant
        type: string
    type: object
  api.RegisterRequest:
    properties:
      email:
        example: you@example.com
        type: string
      password:
        example: correct-horse-battery-staple
        type: string
    type: object
  api.ResumeRequestBody:
    properties:
      resolution:
        example: confirm
        type: string
      thread_id:
        example: silver-fern-cascade
        type: string
    type: object
  api.SessionContextObjectRef:
    properties:
      label:
        example: Cherry Tomato (Sungold)
        type: string
      subject_id:
        example: plant-uuid
        type: string
      subject_type:
        example: plant
        type: string
    type: object
  api.SessionContextObjectRefInput:
    properties:
      subject_id:
        example: plant-uuid
        type: string
      subject_type:
        example: plant
        type: string
    type: object
  api.SessionContextView:
    properties:
      energy_text:
        example: low, focused, tired but can water
        type: string
      focus_context:
        items:
          $ref: '#/definitions/api.SessionContextObjectRef'
        type: array
      focus_text:
        example: How do I fertilize the cherry tomatoes?
        type: string
      source:
        enum:
        - unset
        - inferred
        - user
        example: user
        type: string
      time_text:
        example: 45 minutes, all afternoon
        type: string
      updated_at:
        example: "2026-06-25T12:00:00Z"
        type: string
    type: object
  api.SessionResponse:
    properties:
      email:
        example: you@example.com
        type: string
      preferred_model:
        example: gemini-2.5-flash
        type: string
      preferred_provider:
        example: gemini
        type: string
      user_id:
        example: abc-123-uuid
        type: string
    type: object
  api.SetKeyRequest:
    properties:
      key:
        example: AIzaSy...
        type: string
      provider:
        enum:
        - gemini
        - openai
        - anthropic
        example: gemini
        type: string
    type: object
  api.ThreadIDResponse:
    properties:
      thread_id:
        example: silver-fern-cascade
        type: string
    type: object
  api.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  api.UpdateSessionContextRequest:
    properties:
      energy_text:
        example: low, focused, tired but can water
        type: string
      focus_context:
        items:
          $ref: '#/definitions/api.SessionContextObjectRefInput'
        type: array
      focus_text:
        example: How do I fertilize the cherry tomatoes?
        type: string
      time_text:
        example: 45 minutes, all afternoon
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Gardening Agent
  description: HTTP API gateway for the Gardening Agent system. Sits between Verdant
    (React frontend) and Rhizome (Python LangGraph agent). Handles authentication,
    encrypted provider key storage, and request routing.
  license:
    name: Apache 2.0
  title: Cambium — Gardening Agent API
  version: "1.0"
paths:
  /api/v1/auth/keys:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.KeysResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List configured providers
      tags:
      - keys
    put:
      consumes:
      - application/json
      parameters:
      - description: Provider and API key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.SetKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid provider — must be gemini, openai, or anthropic
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Set provider key
      tags:
      - keys
  /api/v1/auth/keys/{provider}:
    delete:
      parameters:
      - description: Provider name
        enum:
        - gemini
        - openai
        - anthropic
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.KeyDeletedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete provider key
      tags:
      - keys
  /api/v1/chat:
    post:
      consumes:
      - application/json
      parameters:
      - description: Thread ID (from POST /api/v1/threads)
        in: query
        name: thread_id
        required: true
        type: string
      - description: User message
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Rhizome unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Chat (non-streaming)
      tags:
      - chat
  /api/v1/chat/resume:
    post:
      consumes:
      - application/json
      parameters:
      - description: Thread ID and resolution value
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ResumeRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resume interaction (non-streaming)
      tags:
      - chat
  /api/v1/chat/resume/stream:
    post:
      consumes:
      - application/json
      parameters:
      - description: Thread ID and resolution value
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ResumeRequestBody'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream of typed events
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resume interaction (SSE streaming)
      tags:
      - chat
  /api/v1/chat/stream:
    post:
      consumes:
      - application/json
      parameters:
      - description: Thread ID (from POST /api/v1/threads)
        in: query
        name: thread_id
        required: true
        type: string
      - description: User message
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream of typed events
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Chat (SSE streaming)
      tags:
      - chat
  /api/v1/incidents/{id}/treatment:
    post:
      consumes:
      - application/json
      parameters:
      - description: Incident ID
        in: path
        name: id
        required: true
        type: string
      - description: thread_id required
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ResumeRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Draft treatment plan (AI)
      tags:
      - incidents
  /api/v1/notifications:
    get:
      parameters:
      - description: Only return notifications after this timestamp
        in: query
        name: since
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List notifications
      tags:
      - notifications
  /api/v1/notifications/stream:
    get:
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream of typed events (alert, interaction_pending, job_started/job_step/job_complete/job_failed,
            heartbeat)
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Notification stream (SSE)
      tags:
      - notifications
  /api/v1/projects/{id}/tasks/generate:
    post:
      consumes:
      - application/json
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: thread_id required
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ResumeRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Generate project tasks (AI)
      tags:
      - projects
  /api/v1/threads:
    post:
      consumes:
      - application/json
      parameters:
      - description: Optional title, project link, and initial pinned context
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.CreateThreadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Botanical thread ID e.g. silver-fern-cascade
          schema:
            $ref: '#/definitions/api.ThreadIDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create conversation thread
      tags:
      - threads
  /api/v1/threads/{id}/session-context:
    get:
      parameters:
      - description: Thread ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionContextView'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get thread session context
      tags:
      - threads
    patch:
      consumes:
      - application/json
      parameters:
      - description: Thread ID
        in: path
        name: id
        required: true
        type: string
      - description: Partial session context override
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateSessionContextRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionContextView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update thread session context
      tags:
      - threads
  /api/v1/triage/run:
    post:
      consumes:
      - application/json
      parameters:
      - description: thread_id required
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ResumeRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Run daily triage (AI)
      tags:
      - triage
  /api/v1/weather/tasks/draft:
    post:
      consumes:
      - application/json
      parameters:
      - description: thread_id required
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ResumeRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Draft weather task changes (AI)
      tags:
      - weather
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Access token in body; refresh token in httpOnly cookie
          schema:
            $ref: '#/definitions/api.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.LogoutResponse'
      summary: Logout
      tags:
      - auth
  /auth/password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Current and new password
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Wrong current password
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Change password
      tags:
      - auth
  /auth/profile:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Update profile
      tags:
      - auth
  /auth/refresh:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: New access token; new refresh token in httpOnly cookie
          schema:
            $ref: '#/definitions/api.TokenResponse'
        "401":
          description: Refresh token missing, expired, or revoked
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Access token in body; refresh token in httpOnly cookie
          schema:
            $ref: '#/definitions/api.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Email already registered
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Register
      tags:
      - auth
  /auth/session:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Session
      tags:
      - auth
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
      summary: Health check
      tags:
      - system
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'JWT access token — format: "Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
